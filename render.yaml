services:
  - type: web
    name: crypto-signal-pro-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true

  - type: web
    name: crypto-signal-pro-web
    env: static
    rootDir: .
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
